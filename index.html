<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUCCI SLAP - Alpha Gems Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Orbitron:wght@700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0d0618;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40'><text y='32' font-size='32'>👋</text></svg>") 16 16, auto;
        }

        /* ===== SELECT SCREEN ===== */
        #selectScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0d0618;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        #selectScreen.hidden { opacity: 0; transform: scale(1.1); pointer-events: none; }

        .select-bg {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('select-background.png') center/cover no-repeat;
            z-index: 0;
        }
        .select-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(5,2,15,0.7) 100%);
            z-index: 1;
        }

        .select-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(2rem, 7vw, 4.5rem);
            font-weight: 900;
            color: #c084fc;
            text-shadow: 0 0 20px rgba(192,132,252,0.9), 0 0 50px rgba(139,92,246,0.5), 0 0 100px rgba(88,28,135,0.3);
            z-index: 10; position: relative;
            margin-bottom: 5px; text-align: center;
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { text-shadow: 0 0 20px rgba(192,132,252,0.9), 0 0 50px rgba(139,92,246,0.5); color: #c084fc; }
            50% { text-shadow: 0 0 30px rgba(192,132,252,1), 0 0 70px rgba(139,92,246,0.8), 0 0 120px rgba(88,28,135,0.5); color: #e9d5ff; }
        }
        .select-subtitle {
            font-size: clamp(0.6rem, 2vw, 0.9rem);
            color: rgba(167,139,250,0.5); letter-spacing: 8px;
            margin-bottom: 40px; z-index: 10; position: relative;
        }
        .select-label {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: #e9d5ff;
            text-shadow: 0 0 15px rgba(192,132,252,0.6);
            margin-bottom: 30px; z-index: 10; position: relative;
            letter-spacing: 3px;
        }

        .characters-row {
            display: flex;
            gap: clamp(30px, 8vw, 100px);
            z-index: 10; position: relative;
            align-items: flex-end;
        }

        .char-option {
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; transition: all 0.3s ease;
        }
        .char-option:hover { transform: translateY(-10px) scale(1.05); }
        .char-option:hover .char-frame {
            border-color: rgba(192,132,252,0.8);
            box-shadow: 0 0 40px rgba(139,92,246,0.6), 0 0 80px rgba(88,28,135,0.3), inset 0 0 30px rgba(139,92,246,0.1);
        }
        .char-option:hover .char-name { color: #e9d5ff; text-shadow: 0 0 20px rgba(192,132,252,0.8); }

        .char-frame {
            width: clamp(140px, 25vw, 220px); height: clamp(140px, 25vw, 220px);
            border: 2px solid rgba(139,92,246,0.3); border-radius: 15px;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(30,10,60,0.8), rgba(13,6,24,0.9));
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 25px rgba(139,92,246,0.2), inset 0 0 20px rgba(139,92,246,0.05);
            transition: all 0.3s ease;
        }
        .char-frame img { width: 90%; height: 90%; object-fit: contain; filter: drop-shadow(0 0 10px rgba(139,92,246,0.3)); }
        .char-name {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(0.9rem, 2.5vw, 1.3rem);
            color: rgba(192,132,252,0.7); margin-top: 15px;
            letter-spacing: 4px; transition: all 0.3s ease;
        }
        .char-role {
            font-size: clamp(0.5rem, 1.2vw, 0.65rem);
            color: rgba(139,92,246,0.4); margin-top: 5px; letter-spacing: 3px;
        }
        .char-option::after {
            content: ''; width: 80%; height: 20px;
            background: radial-gradient(ellipse, rgba(139,92,246,0.3), transparent);
            border-radius: 50%; margin-top: 10px; filter: blur(5px);
        }

        .select-particles { position: absolute; top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none; }
        .select-particle {
            position: absolute; width: 4px; height: 4px;
            background: rgba(192,132,252,0.6); border-radius: 50%;
            box-shadow: 0 0 6px rgba(192,132,252,0.4);
            animation: sfloat linear infinite;
        }
        @keyframes sfloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; } 90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .select-footer { position:absolute;bottom:20px;color:rgba(139,92,246,0.3);font-size:0.6rem;letter-spacing:3px;z-index:10; }

        /* ===== GAME SCREEN ===== */
        #gameScreen { display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;min-height:100vh; }
        #gameScreen.active { display: flex; }

        .cave-bg { position:fixed;top:0;left:0;width:100%;height:100%;background:url('cave-background.png') center/cover no-repeat;z-index:0; }
        .cave-overlay { position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,rgba(13,6,24,0.3)0%,rgba(13,6,24,0.7)100%);z-index:1; }
        .vignette { position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,transparent 35%,rgba(5,2,15,0.85)100%);pointer-events:none;z-index:2; }
        .ambient-glow { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(139,92,246,0.12)0%,transparent 70%);pointer-events:none;z-index:3;animation:glowP 4s ease-in-out infinite; }
        @keyframes glowP { 0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.3)} }
        canvas#particles { position:fixed;top:0;left:0;width:100%;height:100%;z-index:4;pointer-events:none; }

        .game-title {
            font-family:'Cinzel Decorative',cursive;font-size:clamp(1.8rem,6vw,3.5rem);font-weight:900;
            color:#c084fc;text-shadow:0 0 15px rgba(192,132,252,0.8),0 0 40px rgba(139,92,246,0.5),0 0 80px rgba(88,28,135,0.3);
            margin-bottom:3px;text-align:center;z-index:10;position:relative;letter-spacing:3px;animation:pulse 3s ease-in-out infinite;
        }
        .game-subtitle { font-size:clamp(0.5rem,1.5vw,0.75rem);color:rgba(167,139,250,0.4);margin-bottom:20px;text-align:center;z-index:10;position:relative;letter-spacing:8px; }

        .character-container { position:relative;display:flex;flex-direction:column;align-items:center;z-index:10; }

        .character-wrapper { position: relative; display: inline-block; }

        .character {
            width: clamp(200px, 35vw, 340px); height: auto;
            cursor: pointer; transition: transform 0.1s ease;
            filter: drop-shadow(0 0 25px rgba(139,92,246,0.5)) drop-shadow(0 15px 35px rgba(0,0,0,0.5));
            z-index: 2; border-radius: 20px;
        }
        .character:hover { transform: scale(1.06); filter: drop-shadow(0 0 35px rgba(139,92,246,0.7)) drop-shadow(0 15px 35px rgba(0,0,0,0.5)); }
        .character:active { transform: scale(0.88) rotate(8deg); }

        .character.slapped { animation: slapped 0.5s ease; }
        @keyframes slapped {
            0% { transform: scale(1); }
            10% { transform: scale(0.82) rotate(12deg) translateX(25px); filter: drop-shadow(0 0 40px rgba(192,132,252,0.9)) brightness(1.6); }
            25% { transform: scale(1.18) rotate(-8deg) translateX(-20px); filter: drop-shadow(0 0 50px rgba(192,132,252,1)) brightness(2); }
            45% { transform: scale(0.92) rotate(5deg); filter: brightness(1.4); }
            65% { transform: scale(1.06) rotate(-2deg); }
            100% { transform: scale(1); filter: drop-shadow(0 0 25px rgba(139,92,246,0.5)); }
        }
        .character.glitch { animation: imgGlitch 0.3s ease; }
        @keyframes imgGlitch {
            0% { filter: drop-shadow(0 0 25px rgba(139,92,246,0.5)); }
            25% { filter: drop-shadow(5px 0 rgba(192,132,252,0.9)) drop-shadow(-5px 0 rgba(88,28,135,0.9)) brightness(2.5); }
            50% { filter: drop-shadow(-3px 0 rgba(192,132,252,0.6)) drop-shadow(3px 0 rgba(88,28,135,0.6)) brightness(1.8); }
            100% { filter: drop-shadow(0 0 25px rgba(139,92,246,0.5)); }
        }

        /* Eye canvas overlay */
        .eye-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .redness {
            position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;height:100%;
            background:radial-gradient(circle,rgba(192,132,252,0.35)0%,transparent 70%);
            border-radius:20px;pointer-events:none;opacity:0;transition:opacity .3s ease;z-index:4;
        }

        .slap-count {
            font-size:clamp(.85rem,2.2vw,1.2rem);color:#e9d5ff;margin-top:20px;
            background:linear-gradient(135deg,rgba(88,28,135,.4),rgba(13,6,24,.8));
            border:1px solid rgba(167,139,250,.3);padding:10px 30px;border-radius:8px;
            z-index:10;position:relative;letter-spacing:3px;backdrop-filter:blur(10px);
        }
        .slap-count span { font-size:clamp(1.2rem,3.5vw,1.8rem);font-weight:900;color:#c084fc;text-shadow:0 0 20px rgba(192,132,252,.8); }

        .back-btn {
            position:fixed;top:20px;left:20px;
            background:linear-gradient(135deg,rgba(88,28,135,.5),rgba(30,10,60,.8));
            border:1px solid rgba(167,139,250,.3);color:#c084fc;padding:8px 20px;
            border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.7rem;
            cursor:pointer;z-index:20;letter-spacing:2px;transition:all .3s ease;
        }
        .back-btn:hover { background:linear-gradient(135deg,rgba(139,92,246,.5),rgba(88,28,135,.8));border-color:rgba(192,132,252,.6);box-shadow:0 0 20px rgba(139,92,246,.3); }

        .speech-bubble {
            position:absolute;top:-55px;
            background:linear-gradient(135deg,rgba(30,10,60,.95),rgba(59,7,100,.9));
            color:#e9d5ff;padding:10px 20px;border-radius:8px;font-size:.95rem;
            font-weight:700;border:1px solid rgba(167,139,250,.4);
            box-shadow:0 0 25px rgba(139,92,246,.3);
            opacity:0;transform:scale(0);transition:all .3s cubic-bezier(.68,-.55,.265,1.55);
            z-index:20;white-space:nowrap;text-shadow:0 0 10px rgba(192,132,252,.5);
        }
        .speech-bubble.show { opacity:1;transform:scale(1); }
        .speech-bubble::after {
            content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
            border-left:10px solid transparent;border-right:10px solid transparent;
            border-top:10px solid rgba(30,10,60,.95);
        }

        .reaction { position:absolute;font-size:2rem;pointer-events:none;z-index:15;animation:floatUp 1.5s ease forwards; }
        @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1) rotate(0)} 100%{opacity:0;transform:translateY(-160px) scale(1.5) rotate(25deg)} }

        .slap-effect { position:absolute;font-size:4rem;pointer-events:none;z-index:15;animation:slapPop .6s ease forwards; }
        @keyframes slapPop { 0%{opacity:1;transform:scale(.3) rotate(-20deg)} 40%{opacity:1;transform:scale(1.6) rotate(10deg)} 100%{opacity:0;transform:scale(2.2) rotate(25deg)} }

        .spark { position:absolute;width:4px;height:4px;border-radius:50%;pointer-events:none;animation:sparkFly .8s ease forwards; }
        @keyframes sparkFly { 0%{opacity:1;transform:translate(0) scale(1)} 100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)} }

        .crystal-shard { position:absolute;pointer-events:none;z-index:15;animation:shardFly 1s ease forwards; }
        @keyframes shardFly { 0%{opacity:1;transform:translate(0) rotate(0) scale(1)} 100%{opacity:0;transform:translate(var(--cx),var(--cy)) rotate(var(--cr)) scale(0)} }

        .combo-text {
            position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
            font-family:'Cinzel Decorative',cursive;font-size:clamp(3rem,8vw,5rem);font-weight:900;
            color:#c084fc;text-shadow:0 0 30px rgba(192,132,252,.9),0 0 60px rgba(139,92,246,.5),3px 3px 0 #000;
            pointer-events:none;z-index:50;animation:comboAppear 1.2s ease forwards;
        }
        @keyframes comboAppear {
            0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(-10deg)}
            25%{opacity:1;transform:translate(-50%,-50%) scale(1.4) rotate(3deg)}
            50%{transform:translate(-50%,-50%) scale(1)}
            100%{opacity:0;transform:translate(-50%,-50%) scale(1.6) translateY(-60px)}
        }

        .screen-shake { animation: screenShake .35s ease; }
        @keyframes screenShake { 0%,100%{transform:translate(0)} 20%{transform:translate(-8px,6px)} 40%{transform:translate(8px,-6px)} 60%{transform:translate(-6px,8px)} 80%{transform:translate(6px,-8px)} }

        .star { position:absolute;animation:starSpin 1s ease forwards; }
        @keyframes starSpin { 0%{opacity:1;transform:translate(0) rotate(0) scale(1)} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) rotate(720deg) scale(0)} }

        .milestone-banner {
            position:fixed;top:-120px;left:50%;transform:translateX(-50%);
            background:linear-gradient(135deg,rgba(88,28,135,.9),rgba(30,10,60,.95));
            color:#e9d5ff;padding:18px 45px;border-radius:8px;font-size:clamp(.75rem,2.2vw,1.1rem);
            font-weight:900;border:2px solid rgba(167,139,250,.5);
            box-shadow:0 0 40px rgba(139,92,246,.4);z-index:100;
            transition:top .5s cubic-bezier(.68,-.55,.265,1.55);
            text-align:center;text-shadow:0 0 15px rgba(192,132,252,.6);letter-spacing:2px;white-space:nowrap;
        }
        .milestone-banner.show { top: 30px; }

        .hand-print { position:absolute;font-size:2rem;opacity:.3;pointer-events:none;animation:handFade 2.5s ease forwards; }
        @keyframes handFade { 0%{opacity:.5;transform:scale(1)} 100%{opacity:0;transform:scale(1.3)} }

        .purple-flash { position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at center,rgba(139,92,246,.35)0%,transparent 70%);pointer-events:none;z-index:50;animation:flashOut .3s ease forwards; }
        @keyframes flashOut { 0%{opacity:1} 100%{opacity:0} }

        .footer { position:fixed;bottom:12px;color:rgba(167,139,250,.2);font-size:.6rem;text-align:center;z-index:10;letter-spacing:3px; }
    </style>
</head>
<body>

    <!-- SELECT SCREEN -->
    <div id="selectScreen">
        <div class="select-bg"></div>
        <div class="select-overlay"></div>
        <div class="select-particles" id="selectParticles"></div>
        <div class="select-title">PUCCI SLAP</div>
        <div class="select-subtitle">ALPHA GEMS EDITION</div>
        <div class="select-label">CHOOSE YOUR VICTIM</div>
        <div class="characters-row">
            <div class="char-option" onclick="selectCharacter('slave')">
                <div class="char-frame"><img src="character.png" alt="Slave" draggable="false"></div>
                <div class="char-name">SLAVE</div>
                <div class="char-role">THE OBEDIENT</div>
            </div>
            <div class="char-option" onclick="selectCharacter('pucci')">
                <div class="char-frame"><img src="pucci.png" alt="Pucci" draggable="false"></div>
                <div class="char-name">PUCCI</div>
                <div class="char-role">THE DEFIANT</div>
            </div>
        </div>
        <div class="select-footer">CLICK A CHARACTER TO BEGIN SLAPPING</div>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen">
        <div class="cave-bg"></div>
        <div class="cave-overlay"></div>
        <div class="vignette"></div>
        <div class="ambient-glow" id="ambientGlow"></div>
        <canvas id="particles"></canvas>

        <button class="back-btn" onclick="goBack()">&#9664; BACK</button>

        <div class="game-title">PUCCI SLAP</div>
        <div class="game-subtitle" id="charLabel">ALPHA GEMS EDITION</div>

        <div class="character-container">
            <div class="speech-bubble" id="speechBubble"></div>
            <div class="character-wrapper" id="charWrapper">
                <img class="character" id="character" src="character.png" alt="Character" draggable="false">
                <canvas class="eye-canvas" id="eyeCanvas"></canvas>
                <div class="redness" id="redness"></div>
            </div>
        </div>

        <div class="slap-count">SLAPS: <span id="counter">0</span></div>
        <div class="milestone-banner" id="milestoneBanner"></div>
        <div class="footer">HAPPY APRIL FOOLS DAY // ALPHA GEMS CAVE</div>
    </div>

<script>
// ===== ELEMENTS =====
const selectScreen = document.getElementById('selectScreen');
const gameScreen = document.getElementById('gameScreen');
const character = document.getElementById('character');
const charWrapper = document.getElementById('charWrapper');
const counter = document.getElementById('counter');
const speechBubble = document.getElementById('speechBubble');
const milestoneBanner = document.getElementById('milestoneBanner');
const redness = document.getElementById('redness');
const charLabel = document.getElementById('charLabel');
const particlesCanvas = document.getElementById('particles');
const pCtx = particlesCanvas.getContext('2d');
const eyeCanvas = document.getElementById('eyeCanvas');
const eyeCtx = eyeCanvas.getContext('2d');

let slapCount = 0, comboCount = 0, comboTimer = null, speechTimer = null, glowLevel = 0;
let currentChar = 'slave';
let eyeAnimFrame = 0;
let eyeAnimActive = false;

// ===== EYE POSITIONS (percentage of image) =====
const eyePositions = {
    slave: {
        left:  { x: 0.39, y: 0.27, rx: 0.055, ry: 0.065 },
        right: { x: 0.55, y: 0.27, rx: 0.055, ry: 0.065 }
    },
    pucci: {
        left:  { x: 0.37, y: 0.28, rx: 0.06, ry: 0.065 },
        right: { x: 0.56, y: 0.28, rx: 0.06, ry: 0.065 }
    }
};

// ===== SELECT SCREEN PARTICLES =====
(function() {
    const c = document.getElementById('selectParticles');
    for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'select-particle';
        p.style.left = Math.random()*100+'%';
        p.style.animationDuration = (4+Math.random()*6)+'s';
        p.style.animationDelay = (Math.random()*8)+'s';
        const s = (2+Math.random()*4)+'px';
        p.style.width = s; p.style.height = s;
        c.appendChild(p);
    }
})();

// ===== CHARACTER SELECTION =====
function selectCharacter(name) {
    currentChar = name;
    character.src = name === 'slave' ? 'character.png' : 'pucci.png';
    charLabel.textContent = 'SLAPPING: ' + name.toUpperCase();
    slapCount = 0; counter.textContent = '0'; glowLevel = 0; redness.style.opacity = 0;
    eyeCtx.clearRect(0, 0, eyeCanvas.width, eyeCanvas.height);

    selectScreen.classList.add('hidden');
    gameScreen.classList.add('active');
    setTimeout(() => {
        resizeCanvas();
        resizeEyeCanvas();
        if (!particlesRunning) { particlesRunning = true; animateParticles(); }
    }, 100);
}

function goBack() {
    selectScreen.classList.remove('hidden');
    gameScreen.classList.remove('active');
    eyeCtx.clearRect(0, 0, eyeCanvas.width, eyeCanvas.height);
}

// ===== SOUND SYSTEM =====
const slapSounds = ['sounds/slap1.mp3','sounds/slap2.mp3','sounds/slap3.mp3','sounds/smack.mp3'];
const moanSounds = [
    'sounds/yamete1.mp3', 'sounds/yamete2.mp3', 'sounds/yamete_ah.mp3',
    'sounds/moan_anime.mp3', 'sounds/anime_moan.mp3',
    'sounds/ara_ara.mp3', 'sounds/onii_chan.mp3', 'sounds/oh_no.mp3',
    'sounds/nani.mp3', 'sounds/uwu.mp3', 'sounds/senpai.mp3',
    'sounds/rikka_ow.mp3', 'sounds/ahhhh.mp3',
    'sounds/karen_noooo.mp3', 'sounds/megumin_yamero.mp3',
    'sounds/aqua_cry.mp3', 'sounds/kanna_kawaii.mp3',
    'sounds/mya.mp3', 'sounds/kimoi.mp3', 'sounds/urusai.mp3',
    'sounds/karen_ayaya.mp3', 'sounds/sagiri_baka.mp3',
    'sounds/asuka_baka.mp3', 'sounds/megumin_eye.mp3'
];

const audioCache = {};
[...slapSounds, ...moanSounds].forEach(src => {
    const arr = [];
    for (let i = 0; i < 3; i++) {
        const a = new Audio(src);
        a.preload = 'auto';
        a.volume = src.startsWith('sounds/slap') || src === 'sounds/smack.mp3' ? 0.5 : 0.7;
        arr.push(a);
    }
    audioCache[src] = { pool: arr, idx: 0 };
});

function playSound(src) {
    const c = audioCache[src]; if (!c) return;
    const a = c.pool[c.idx]; c.idx = (c.idx + 1) % c.pool.length;
    a.currentTime = 0; a.play().catch(()=>{});
}
function playRandomSlap() { playSound(slapSounds[Math.floor(Math.random()*slapSounds.length)]); }
function playRandomMoan() { playSound(moanSounds[Math.floor(Math.random()*moanSounds.length)]); }

// ===== CRYSTAL PARTICLES =====
let particles = [], particlesRunning = false;
function resizeCanvas() { particlesCanvas.width = window.innerWidth; particlesCanvas.height = window.innerHeight; }
window.addEventListener('resize', () => { resizeCanvas(); resizeEyeCanvas(); });

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random()*particlesCanvas.width; this.y = Math.random()*particlesCanvas.height;
        this.size = Math.random()*3+1; this.speedY = -Math.random()*0.4-0.1; this.speedX = (Math.random()-0.5)*0.3;
        this.opacity = Math.random()*0.4+0.1; this.pulse = Math.random()*Math.PI*2;
        this.pulseSpeed = Math.random()*0.02+0.01; this.hue = 260+Math.random()*40;
    }
    update() { this.y+=this.speedY; this.x+=this.speedX; this.pulse+=this.pulseSpeed; if(this.y<-10){this.reset();this.y=particlesCanvas.height+10;} }
    draw() {
        const a = this.opacity*(0.5+Math.sin(this.pulse)*0.5);
        pCtx.beginPath(); pCtx.arc(this.x,this.y,this.size,0,Math.PI*2);
        pCtx.fillStyle=`hsla(${this.hue},80%,75%,${a})`; pCtx.shadowBlur=10;
        pCtx.shadowColor=`hsla(${this.hue},80%,75%,${a*0.5})`; pCtx.fill(); pCtx.shadowBlur=0;
    }
}
for (let i=0;i<60;i++) particles.push(new Particle());
function animateParticles() {
    pCtx.clearRect(0,0,particlesCanvas.width,particlesCanvas.height);
    particles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(animateParticles);
}

// ===== EYE BULGE SYSTEM =====
function resizeEyeCanvas() {
    const rect = character.getBoundingClientRect();
    const wrapper = charWrapper.getBoundingClientRect();
    eyeCanvas.width = rect.width;
    eyeCanvas.height = rect.height;
    eyeCanvas.style.width = rect.width + 'px';
    eyeCanvas.style.height = rect.height + 'px';
    eyeCanvas.style.left = (rect.left - wrapper.left) + 'px';
    eyeCanvas.style.top = (rect.top - wrapper.top) + 'px';
}

function drawBulgeEyes(scale, pupilOffsetX, pupilOffsetY) {
    if (!eyeCanvas.width) resizeEyeCanvas();
    eyeCtx.clearRect(0, 0, eyeCanvas.width, eyeCanvas.height);

    const w = eyeCanvas.width;
    const h = eyeCanvas.height;
    const eyes = eyePositions[currentChar];

    [eyes.left, eyes.right].forEach(eye => {
        const cx = eye.x * w;
        const cy = eye.y * h;
        const rx = eye.rx * w * scale;
        const ry = eye.ry * h * scale;

        // White of eye
        eyeCtx.save();
        eyeCtx.beginPath();
        eyeCtx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        eyeCtx.fillStyle = '#fff';
        eyeCtx.shadowBlur = 8;
        eyeCtx.shadowColor = 'rgba(255,255,255,0.5)';
        eyeCtx.fill();
        eyeCtx.strokeStyle = '#333';
        eyeCtx.lineWidth = 2;
        eyeCtx.stroke();
        eyeCtx.restore();

        // Iris (orange like the originals)
        const irisR = rx * 0.55;
        eyeCtx.beginPath();
        eyeCtx.arc(cx + pupilOffsetX * rx * 0.2, cy + pupilOffsetY * ry * 0.2, irisR, 0, Math.PI * 2);
        eyeCtx.fillStyle = '#e67e22';
        eyeCtx.fill();

        // Pupil
        const pupilR = irisR * 0.5;
        eyeCtx.beginPath();
        eyeCtx.arc(cx + pupilOffsetX * rx * 0.3, cy + pupilOffsetY * ry * 0.3, pupilR, 0, Math.PI * 2);
        eyeCtx.fillStyle = '#111';
        eyeCtx.fill();

        // Shine
        eyeCtx.beginPath();
        eyeCtx.arc(cx - rx * 0.2, cy - ry * 0.25, rx * 0.15, 0, Math.PI * 2);
        eyeCtx.fillStyle = 'rgba(255,255,255,0.8)';
        eyeCtx.fill();
    });
}

function animateEyeBulge() {
    if (eyeAnimActive) return;
    eyeAnimActive = true;
    resizeEyeCanvas();

    const duration = 800; // ms
    const startTime = Date.now();

    function frame() {
        const elapsed = Date.now() - startTime;
        const t = Math.min(elapsed / duration, 1);

        // Scale: quickly bulge to 2x then settle back
        let scale;
        if (t < 0.15) {
            scale = 1 + (t / 0.15) * 1.2; // 1 -> 2.2
        } else if (t < 0.35) {
            const p = (t - 0.15) / 0.2;
            scale = 2.2 - p * 0.5; // 2.2 -> 1.7
        } else if (t < 0.6) {
            const p = (t - 0.35) / 0.25;
            scale = 1.7 + Math.sin(p * Math.PI) * 0.3; // wobble
        } else {
            const p = (t - 0.6) / 0.4;
            scale = 1.7 - p * 0.7; // 1.7 -> 1.0
        }

        // Pupil jiggle
        const jiggle = Math.max(0, 1 - t * 1.5);
        const px = Math.sin(elapsed * 0.03) * jiggle;
        const py = Math.cos(elapsed * 0.025) * jiggle;

        drawBulgeEyes(scale, px, py);

        if (t < 1) {
            requestAnimationFrame(frame);
        } else {
            // Fade out
            const fadeStart = Date.now();
            const fadeDuration = 300;
            function fadeFrame() {
                const ft = Math.min((Date.now() - fadeStart) / fadeDuration, 1);
                eyeCtx.clearRect(0, 0, eyeCanvas.width, eyeCanvas.height);
                if (ft < 1) {
                    eyeCanvas.style.opacity = 1 - ft;
                    drawBulgeEyes(1, 0, 0);
                    requestAnimationFrame(fadeFrame);
                } else {
                    eyeCanvas.style.opacity = 1;
                    eyeCtx.clearRect(0, 0, eyeCanvas.width, eyeCanvas.height);
                    eyeAnimActive = false;
                }
            }
            fadeFrame();
        }
    }
    frame();
}

// ===== GAME DATA =====
const speechTexts = [
    'OUCH!', 'AAAA!', 'WHY?!', 'IT HURTS!', 'STOP IT!',
    'PLEASE NO!', 'MERCY!', 'MOMMY!', 'WHAT FOR?!', 'STOP!',
    'AAAUUCH!', 'QUIT IT!', 'APRIL FOOLS!',
    'NOT FUNNY!', 'ENOUGH!', 'SAVE ME!', 'NOOO!',
    'OW-OW-OW!', 'AAAAAAA!!!',
    'PLEASE!', 'WHAT THE?!', 'NOT THE FACE!',
    'GEM CRACKED!', 'CRITICAL HIT!', 'MY GEMS!',
    'AAAHHH~!', 'YAMETE!', 'KYAAA~!', 'NANI?!',
    'HARDER~!', 'UWU~!', 'SENPAI NO!',
    'BAKA!', 'ONII-CHAN~!', 'ARA ARA~!', 'KIMOI!',
    'IM SORRY!', 'MY EYES!'
];
const reactions = ['💥','💎','🔮','💀','⚡','👊','💢','✨','☠️','🗿','💜','👋'];
const milestones = { 10:'CAVE EXPLORER', 25:'CRYSTAL CRUSHER', 50:'GEM BREAKER', 100:'ALPHA SLAPPER', 200:'CAVE DESTROYER', 500:'TRANSCENDED GEM LORD' };

// ===== HELPERS =====
function rnd(a) { return a[Math.floor(Math.random()*a.length)]; }

function showSpeech(t) {
    speechBubble.textContent = t; speechBubble.classList.add('show');
    clearTimeout(speechTimer); speechTimer = setTimeout(()=>speechBubble.classList.remove('show'),1200);
}
function createReaction(x,y) {
    const e=document.createElement('div'); e.className='reaction'; e.textContent=rnd(reactions);
    e.style.left=(x+(Math.random()-.5)*100)+'px'; e.style.top=(y-20)+'px';
    e.style.fontSize=(1.5+Math.random()*2)+'rem'; document.body.appendChild(e);
    setTimeout(()=>e.remove(),1500);
}
function createSlapFx(x,y) {
    const e=document.createElement('div'); e.className='slap-effect'; e.textContent='💥';
    e.style.left=x+'px'; e.style.top=y+'px'; document.body.appendChild(e);
    setTimeout(()=>e.remove(),600);
}
function createSparks(x,y) {
    for(let i=0;i<15;i++){
        const s=document.createElement('div'); s.className='spark';
        s.style.left=x+'px'; s.style.top=y+'px';
        const a=Math.random()*Math.PI*2, d=50+Math.random()*120;
        s.style.setProperty('--sx',Math.cos(a)*d+'px'); s.style.setProperty('--sy',Math.sin(a)*d+'px');
        const c=['#c084fc','#a855f7','#7c3aed','#e9d5ff','#f0abfc'][Math.floor(Math.random()*5)];
        s.style.background=c; s.style.boxShadow=`0 0 8px ${c}`;
        document.body.appendChild(s); setTimeout(()=>s.remove(),800);
    }
}
function createShards(x,y) {
    const sh=['💎','🔮','✨','💜','♦️'];
    for(let i=0;i<6;i++){
        const e=document.createElement('div'); e.className='crystal-shard'; e.textContent=rnd(sh);
        e.style.left=x+'px'; e.style.top=y+'px'; e.style.fontSize=(.8+Math.random()*1.2)+'rem';
        const a=Math.random()*Math.PI*2, d=60+Math.random()*100;
        e.style.setProperty('--cx',Math.cos(a)*d+'px'); e.style.setProperty('--cy',Math.sin(a)*d+'px');
        e.style.setProperty('--cr',(Math.random()*720-360)+'deg');
        document.body.appendChild(e); setTimeout(()=>e.remove(),1000);
    }
}
function createFlash() { const f=document.createElement('div');f.className='purple-flash';document.body.appendChild(f);setTimeout(()=>f.remove(),300); }
function createStars() {
    for(let i=0;i<6;i++){
        const s=document.createElement('div'); s.className='star'; s.textContent=rnd(['⭐','💫','✨','💎']);
        s.style.fontSize=(.8+Math.random())+'rem'; s.style.left='50%'; s.style.top='20%';
        const a=Math.random()*Math.PI*2, d=60+Math.random()*90;
        s.style.setProperty('--tx',Math.cos(a)*d+'px'); s.style.setProperty('--ty',Math.sin(a)*d+'px');
        charWrapper.appendChild(s); setTimeout(()=>s.remove(),1000);
    }
}
function showCombo(n) {
    const e=document.createElement('div');e.className='combo-text';e.textContent=n+'x COMBO';
    document.body.appendChild(e);setTimeout(()=>playRandomSlap(),0);setTimeout(()=>playRandomSlap(),80);
    setTimeout(()=>e.remove(),1200);
}
function showMilestone(t) {
    milestoneBanner.textContent=t;milestoneBanner.classList.add('show');createConfetti();
    setTimeout(()=>milestoneBanner.classList.remove('show'),3500);
}
function createConfetti() {
    const cols=['#c084fc','#a855f7','#7c3aed','#e9d5ff','#f0abfc','#581c87','#ddd6fe'];
    for(let i=0;i<70;i++){
        const p=document.createElement('div'),c=rnd(cols);
        p.style.cssText=`position:fixed;left:${Math.random()*100}vw;top:-20px;width:${3+Math.random()*8}px;height:${3+Math.random()*8}px;background:${c};border-radius:${Math.random()>.5?'50%':'2px'};pointer-events:none;z-index:100;box-shadow:0 0 8px ${c}`;
        const dur=1.5+Math.random()*2,dr=(Math.random()-.5)*250;
        p.style.transition=`all ${dur}s ease`;document.body.appendChild(p);
        requestAnimationFrame(()=>{p.style.transform=`translateY(${innerHeight+50}px) translateX(${dr}px) rotate(${Math.random()*720}deg)`;p.style.opacity='0';});
        setTimeout(()=>p.remove(),dur*1000+100);
    }
}
function createHand(x,y) {
    const e=document.createElement('div');e.className='hand-print';e.textContent='🖐️';
    e.style.left=x+'px';e.style.top=y+'px';e.style.transform=`rotate(${Math.random()*60-30}deg)`;
    document.body.appendChild(e);setTimeout(()=>e.remove(),2500);
}

// ===== MAIN CLICK =====
character.addEventListener('click', (e) => {
    slapCount++;
    counter.textContent = slapCount;

    // SOUNDS
    playRandomSlap();
    setTimeout(() => playRandomMoan(), 50 + Math.random() * 100);

    // EYE BULGE
    animateEyeBulge();

    // SLAP ANIMATION
    character.classList.remove('slapped','glitch');
    void character.offsetWidth;
    character.classList.add('slapped');
    if (slapCount % 3 === 0) character.classList.add('glitch');

    // FLASH
    createFlash();

    // GLOW
    glowLevel = Math.min(glowLevel + 0.07, 0.9);
    redness.style.opacity = glowLevel;

    // SCREEN SHAKE
    if (slapCount % 3 === 0) {
        document.body.classList.remove('screen-shake');
        void document.body.offsetWidth;
        document.body.classList.add('screen-shake');
    }

    // SPEECH
    showSpeech(rnd(speechTexts));

    // EFFECTS
    const rect = character.getBoundingClientRect();
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    for (let i = 0; i < 3 + Math.floor(Math.random()*3); i++) createReaction(cx, cy);
    createSlapFx(e.clientX-20, e.clientY-20);
    createSparks(e.clientX, e.clientY);
    createShards(e.clientX, e.clientY);
    createStars();
    createHand(e.clientX-15, e.clientY-15);

    // COMBO
    comboCount++;
    clearTimeout(comboTimer);
    comboTimer = setTimeout(() => { if (comboCount >= 5) showCombo(comboCount); comboCount = 0; }, 600);

    // MILESTONES
    if (milestones[slapCount]) showMilestone(milestones[slapCount]);

    // COUNTER POP
    counter.style.transform='scale(1.6)';counter.style.transition='transform .15s ease';
    setTimeout(()=>counter.style.transform='scale(1)',150);

    // AMBIENT
    document.getElementById('ambientGlow').style.background=`radial-gradient(circle,rgba(192,132,252,${.12+Math.min(slapCount*.002,.25)})0%,transparent 70%)`;
});

// ===== RAPID CLICKS =====
let rapidClicks=0,rapidTimer=null;
character.addEventListener('mousedown',()=>{
    rapidClicks++;clearTimeout(rapidTimer);
    rapidTimer=setTimeout(()=>{
        if(rapidClicks>=10){
            showSpeech('YAMETE KUDASAI!!! AAAHH~!!!');
            document.body.classList.remove('screen-shake');void document.body.offsetWidth;
            document.body.classList.add('screen-shake');createConfetti();
            for(let i=0;i<3;i++) setTimeout(()=>playRandomMoan(),i*150);
        }
        rapidClicks=0;
    },1000);
});

// ===== IDLE =====
(function idle(){
    if(!character.classList.contains('slapped')&&!eyeAnimActive){
        const t=Date.now()/1000;
        character.style.transform=`translateY(${Math.sin(t*1.5)*6}px) rotate(${Math.sin(t*1.2)*2}deg)`;
    }
    requestAnimationFrame(idle);
})();

// ===== GLOW FADE =====
setInterval(()=>{ if(glowLevel>0){glowLevel=Math.max(0,glowLevel-.005);redness.style.opacity=glowLevel;} },200);
</script>
